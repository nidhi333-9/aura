name: Build Sensor

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd tracker
          pip install pyinstaller pywinctl requests
      - name: Build
        run: |
          cd tracker
          pyinstaller --onefile --name "aura-sensor-mac" sensor.py
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: tracker/dist/aura-sensor-mac

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd tracker
          pip install pyinstaller pywinctl requests
      - name: Build
        run: |
          cd tracker
          pyinstaller --onefile --name "aura-sensor-windows" sensor.py
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: tracker/dist/aura-sensor-windows.exe
